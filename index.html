<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>HIIT Pro</title>
<script>document.write('<link rel="stylesheet" href="style.css?' + Date.now() + '">');</script>
</head>
<body>

<!-- MAIN -->
<div id="main" class="page" style="display:block">
  <h1>HIIT</h1>
  <div id="manageList"></div>
  <div class="main-section-title">Create New Workout</div>
  <div class="main-btns">
    <button id="btnNew">+ Custom</button>
    <button id="btnSuggest" class="primary">+ Auto Generate</button>
  </div>
</div>

<!-- DETAIL -->
<div id="detail" class="page" style="display:none">
  <div class="detail-top-row">
    <button id="btnDetailBack">Back</button>
    <button id="btnStartTop" class="detail-start-btn">Start Workout</button>
  </div>
  <div id="detailContent"></div>
  <button id="btnStartBottom" class="detail-start-btn">Start Workout</button>
  <div class="detail-actions">
    <button id="btnDetailEdit">Edit</button>
    <button id="btnDetailDelete" class="control-danger">Delete</button>
  </div>
</div>

<!-- SUGGEST -->
<div id="suggest" class="page" style="display:none">
  <h2>Smart Workout</h2>
  <label>Duration</label>
  <div class="option-row" id="timeOptions"></div>
  <label>Intensity</label>
  <div class="option-row" id="intensityOptions"></div>
  <label>Body Parts</label>
  <div class="option-row">
    <button id="btnSelectAll">Select All</button>
    <button id="btnDeselectAll">Deselect All</button>
  </div>
  <div class="body-part-grid" id="bodyPartOptions"></div>
  <label>Equipment Available</label>
  <div class="option-row">
    <button id="btnEqSelectAll">Select All</button>
    <button id="btnEqDeselectAll">Deselect All</button>
  </div>
  <div class="body-part-grid" id="equipOptions"></div>
  <button id="btnGenerate" class="primary" style="width:90%;margin-top:16px;">Generate Workout</button>
  <button id="btnBackSuggest" style="width:90%;margin-top:4px;">Back</button>
</div>

<!-- FORM -->
<div id="form" class="page" style="display:none">
  <h2 id="formTitle">Workout</h2>
  <label>Name</label>
  <input id="name">
  <label>Work (sec)</label>
  <input id="work" type="number">
  <label>Rest (sec)</label>
  <input id="rest" type="number">
  <label>Rounds</label>
  <input id="rounds" type="number">
  <label>Water break (sec)</label>
  <input id="water" type="number">
  <label>Warmup (sec)</label>
  <input id="warmup" type="number">
  <label>Cooldown (sec)</label>
  <input id="cooldown" type="number">
  <h3>Exercises</h3>
  <div id="exerciseList"></div>
  <div class="form-btns">
    <button id="btnAddEx">+ Custom</button>
    <button id="btnPickEx" class="primary">+ Pick Exercise</button>
  </div>
  <button id="btnSave" class="primary" style="width:90%;margin-top:8px;">Save Workout</button>
  <button id="btnBackEdit" style="width:90%;margin-top:4px;">Back</button>
</div>

<!-- EXERCISE PICKER MODAL -->
<div id="pickerOverlay" class="overlay" style="display:none;" onclick="closePicker()">
  <div class="picker-box" onclick="event.stopPropagation()">
    <div class="picker-handle"></div>
    <h3>Pick Exercises</h3>
    <p class="picker-hint">Filter by equipment, then tap to select</p>
    <div id="pickerEquip" class="picker-eq-row"></div>
    <div id="pickerList"></div>
    <div style="margin-top:12px;">
      <button id="btnPickerDone" class="primary">Add Selected</button>
      <button id="btnPickerCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- RUN -->
<div id="run" class="page" style="display:none">
  <div id="phase"></div>
  <div id="exerciseDemo" style="display:none;"></div>
  <div id="current"></div>
  <div id="currentEquip"></div>
  <div class="circle">
    <svg viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="96"></circle>
      <circle id="progressCircle" cx="110" cy="110" r="96"></circle>
    </svg>
    <div class="circle-inner">
      <div id="timer">0</div>
      <div id="timerSub">sec</div>
    </div>
  </div>
  <div id="next"></div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="statRound">--</div>
      <div class="stat-label">Round</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="statExercise">--</div>
      <div class="stat-label">Exercise</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="statElapsed">0:00</div>
      <div class="stat-label">Elapsed</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="statRemaining">--</div>
      <div class="stat-label">Left</div>
    </div>
  </div>
  <div class="bar"><div id="totalProgress"></div></div>
  <div id="barLabel"></div>
  <div class="music-bar">
    <button id="btnMusicToggle">Music: Off</button>
    <button id="btnMusicStyle">Electronic</button>
    <button id="btnVoice">Default Voice</button>
  </div>
  <div class="controls">
    <button id="btnPause">Pause</button>
    <button id="btnSkip">Skip</button>
    <button id="btnRestart">Restart</button>
    <button id="btnEndEarly" style="display:none">End Workout</button>
  </div>
  <div id="donePanel" style="display:none; margin-top:24px;">
    <button id="btnHome" class="detail-start-btn">Back to Home</button>
    <p id="doneMsg">&#x1F389; Workout complete!</p>
    <div id="summary"></div>
    <button id="btnHome2" class="detail-start-btn" style="margin-top:12px;">Back to Home</button>
  </div>
  <div id="tutorialArea" class="tutorial-area"></div>
  <div id="workoutInfo" class="workout-info" style="display:none;"></div>
</div>

<!-- TUTORIAL OVERLAY -->
<div id="tutorialOverlay" class="overlay" style="display:none;" onclick="if(typeof closeTutorialOverlay==='function')closeTutorialOverlay()"></div>

<script>
var _cb = Date.now();
document.write('<script src="exercises.js?' + _cb + '"><\/script>');
document.write('<script src="tutorial.js?' + _cb + '"><\/script>');
document.write('<script src="demo.js?' + _cb + '"><\/script>');
document.write('<script src="music.js?' + _cb + '"><\/script>');
document.write('<script src="app.js?' + _cb + '"><\/script>');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIIT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
  <h1>HIIT</h1>
  <button class="primary" onclick="go('select')">Choose Workout</button>
  <button onclick="go('edit')">Edit Workouts</button>
</div>

<!-- SELECT -->
<div id="select" class="page">
  <h2>Choose Workout</h2>
  <div id="workoutList"></div>
  <button class="primary" onclick="startSelected()">Start</button>
  <button onclick="go('home')">Back</button>
</div>

<!-- EDIT -->
<div id="edit" class="page">
  <h2>Manage Workouts</h2>
  <div id="manageList"></div>
  <button class="primary" onclick="newWorkout()">+ New Workout</button>
  <button onclick="go('home')">Back</button>
</div>

<!-- FORM -->
<div id="form" class="page">
  <h2 id="formTitle">New Workout</h2>

  <label>Name</label>
  <input id="name">

  <label>Work (sec)</label>
  <input id="work" type="number">

  <label>Rest (sec)</label>
  <input id="rest" type="number">

  <label>Rounds</label>
  <input id="rounds" type="number">

  <label>Water Break (sec)</label>
  <input id="water" type="number">

  <label>Warmup</label>
  <input id="warmup" type="number">

  <label>Cooldown</label>
  <input id="cooldown" type="number">

  <h3>Exercises</h3>
  <div id="exerciseList"></div>

  <button onclick="addExercise()">+ Add Exercise</button>

  <button class="primary" onclick="save()">Save</button>
  <button onclick="go('edit')">Back</button>
</div>

<script src="app.js"></script>
</body>
</html>
